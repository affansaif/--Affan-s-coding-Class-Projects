<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Formatter's Lab</title>
    </head>
    <body>
        <!--Let's try using various formatting -->
        <b>this is bold text</b>
        <strong>this is also bold texr</strong><br>

        <i>this is italic text</i><br>
        <em>this is also italic text</em><br>

        <mark>this is highlighted text</mark><br>

        <del>this is strike-through text</del> <br>

        Math Formula x<sup>2</sup>. <br>
        Chemistry Formula CO<sub>2</sub> <br>

        <blockquote>
        this is blockquote to quote some sentences from other sources
        </blockquote>
    </body>
</html>
